aid: hawkeye
name: Hawk-Eye Innovations
description: >-
  Hawk-Eye Innovations is a Basingstoke, UK-headquartered sports technology
  company and part of the Sony Group, specializing in precision optical
  tracking, electronic officiating, video replay, and performance analytics
  across 25+ professional sports in 100+ countries. Founded in 2001 by Paul
  Hawkins and acquired by Sony in 2011, Hawk-Eye operates alongside Pulselive
  and Beyond Sports within Sony's sports division. The company is the standard
  for ball-tracking in tennis (Electronic Line Calling, now used in place of
  human line judges at the major tours), goal-line technology and
  semi-automated offside in football (Premier League, FIFA), video replay in
  cricket (DRS), NFL, NBA, MLB, NHL, rugby, and PGA Tour shot-tracking. Core
  product platforms include SMART Replay, SMART Track, SMART Insight, HawkAR,
  iHawk, HawkREPLAY, HawkNEST, HawkVISION, SkeleTRACK, Electronic Line Calling,
  Goal Line Technology, Semi-Automated Offside Technology, and VAR systems.
  Revenue comes from long-term contracts with leagues, federations, and
  broadcasters; there is no public developer API, SDK, or open-source
  release for Hawk-Eye products. All integrations are bespoke and
  delivered through Sony Sports Business / Hawk-Eye operations teams.
